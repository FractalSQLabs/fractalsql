name: Release postgresql-fractalsql Packages

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build per-PG-version .so for ${{ matrix.architecture }}
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.architecture }}

      - name: Build .deb and .rpm for ${{ matrix.architecture }}
        run: |
          chmod +x package.sh
          ./package.sh ${{ matrix.architecture }}

      - name: Upload artifacts (per-arch)
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-fractalsql-${{ matrix.architecture }}
          path: dist/packages/*
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
